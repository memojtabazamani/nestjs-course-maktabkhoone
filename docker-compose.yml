version: '3.8'

# Dev setup: only Postgres runs in Docker.
# Run NestJS locally with: npm run start:dev

services:
  postgres:
    image: postgres:16-alpine
    container_name: my-postgres-nestjscourse
    restart: unless-stopped
    environment:
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mypassword
      POSTGRES_DB: nestjscourse
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U myuser -d nestjscourse"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
