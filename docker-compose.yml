version: '3.8'

services:
  mongodb:
    image: mongo:latest  # استفاده از آخرین نسخه مونگو
    container_name: my-nest-mongodb
    restart: always
    ports:
      - "27017:27017"  # پورت پیش‌فرض مونگو
    environment:
      - MONGO_INITDB_ROOT_USERNAME=admin  # یوزرنیم ادمین (اختیاری)
      - MONGO_INITDB_ROOT_PASSWORD=password  # پسورد ادمین (اختیاری)
      - MONGO_INITDB_DATABASE=nestdb  # اسم دیتابیسی که می‌خوای بسازه
    volumes:
      - mongo_data:/data/db  # برای ذخیره موندگار اطلاعات
    networks:
      - nest-network

  app:
    build: .
    container_name: my-nest-app
    restart: always
    ports:
      - "3000:3000"  # پورت پیش‌فرض NestJS
    environment:
      - MONGODB_URI=mongodb://admin:password@mongodb:27017/nestdb?authSource=admin
    depends_on:
      - mongodb  # می‌گه که اول mongodb باید بالا بیاد
    volumes:
      - .:/app  # برای sync کردن فایل‌ها در زمان توسعه (اختیاری)
      - /app/node_modules
    networks:
      - nest-network

volumes:
  mongo_data:  # تعریف volume برای دیتای مونگو

networks:
  nest-network:
    driver: bridge